# Cilium 설정 파일 예시
# 실제 위치: /etc/cilium/ciliumd.yaml 또는 ConfigMap
#
# 이 파일은 PoC 시뮬레이터에서 사용하는 샘플 설정이다.
# 실제 Cilium은 pkg/option/config.go의 DaemonConfig 구조체로 파싱한다.

enable-policy: always
routing-mode: tunnel
tunnel-protocol: vxlan
enable-ipv4: true
enable-ipv6: false
enable-hubble: true
kube-proxy-replacement: true
bpf-lb-algorithm: maglev
cluster-name: my-cluster
cluster-id: 1
