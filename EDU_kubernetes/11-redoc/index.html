        openapi.yaml 파일을 같은 디렉토리에 두어야 합니다.

        NOTE: file:// 프로토콜에서는 YAML 로딩이 안 될 수 있습니다.

    </style>
</head>

               },
               "typography": {
                   "fontSize": "15px",
                   "fontFamily": "Pretendard, -apple-system, sans-serif"
               },

                   "backgroundColor": "#fafafa"
               }
