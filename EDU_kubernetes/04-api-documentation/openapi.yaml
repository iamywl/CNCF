# =============================================
# 수동 작성 OpenAPI 명세 (참고용)
# =============================================
# swagger-jsdoc이 코드에서 자동 생성하는 것과 동일한 내용을
# YAML 파일로 직접 작성한 예시입니다.
# 이 파일은 서버에서 사용하지 않으며, 학습 참고용입니다.

openapi: 3.0.0

info:
  title: E-Commerce API
  version: 1.0.0
  description: |
    OpenAPI 명세를 YAML로 직접 작성하는 예시입니다.
    실제 프로젝트에서는 코드 주석(@swagger)으로 자동 생성하거나,
    이 YAML을 먼저 작성한 후 코드를 생성(Code-First vs Design-First)합니다.

servers:
  - url: http://localhost:3000
    description: 로컬 개발 서버

paths:
  /api/products:
    get:
      tags: [Products]
      summary: 전체 상품 목록 조회
      parameters:
        - in: query
          name: category
          schema:
            type: string
          description: 카테고리 필터
      responses:
        '200':
          description: 상품 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'

    post:
      tags: [Products]
      summary: 새 상품 등록
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        '201':
          description: 등록된 상품
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: 필수 필드 누락

  /api/products/{id}:
    get:
      tags: [Products]
      summary: 상품 상세 조회
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 상품 상세
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: 상품 없음

components:
  schemas:
    Product:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "MacBook Pro 14"
        price:
          type: number
          example: 2990000
        stock:
          type: integer
          example: 50
        category:
          type: string
          example: "전자제품"

    ProductInput:
      type: object
      required: [name, price]
      properties:
        name:
          type: string
        price:
          type: number
        stock:
          type: integer
        category:
          type: string
